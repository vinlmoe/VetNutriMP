# Configuration mémoire optimisée pour la compilation
org.gradle.jvmargs=-Xmx16g -XX:MaxMetaspaceSize=6144m -XX:+UseG1GC -XX:+UseStringDeduplication -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx16g -XX:+UseG1GC -XX:+UseStringDeduplication
org.gradle.parallel=true
org.gradle.workers.max=4
org.gradle.caching=true
org.gradle.configureondemand=true
kotlin.incremental=true
kotlin.code.style=official

# Optimisations spécifiques pour le compilateur Kotlin
kotlin.incremental.useClasspathSnapshot=false
kotlin.incremental.classpathSnapshotEnabled=false
kotlin.build.report.enable=false
kotlin.build.report.verbose=false
kotlin.compiler.execution.strategy=in-process
kotlin.incremental.multiplatform=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true

#MPP
kotlin.mpp.androidSourceSetLayoutVersion=2
kotlin.mpp.enableCInteropCommonization=true
kotlin.native.disableCompilerDaemon = true

#Tests
kotlin.mpp.androidSourceSetLayoutV2AndroidStyleDirs.nowarn=true
kotlin.test.infer.jvm.variant=true

#Experimental Features
kotlin.mpp.stability.nowarn=true
kotlin.native.ignoreDisabledTargets=true
kotlin.native.binary.memoryModel=experimental
kotlin.native.binary.freezing=disabled

#ksp
ksp.useKSP2=true


