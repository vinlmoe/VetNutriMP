org.gradle.jvmargs=-Dorg.fusesource.jansi.skip=true
org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx6g
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.configureondemand=true
kotlin.incremental=true
kotlin.code.style=official
kotlin.code.style=official

#Gradle
org.gradle.jvmargs=-Xmx2048M -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options\="-Xmx2048M"

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true

#MPP
kotlin.mpp.androidSourceSetLayoutVersion=2
kotlin.mpp.enableCInteropCommonization=true
kotlin.native.disableCompilerDaemon = true

#Tests
kotlin.mpp.androidSourceSetLayoutV2AndroidStyleDirs.nowarn=true
kotlin.test.infer.jvm.variant=true

#Experimental Features
kotlin.mpp.stability.nowarn=true
kotlin.native.ignoreDisabledTargets=true
kotlin.native.binary.memoryModel=experimental
kotlin.native.binary.freezing=disabled

#ksp
ksp.useKSP2=true
