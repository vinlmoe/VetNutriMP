# Configuration minimale pour compilation iOS
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+UseG1GC -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx1g
org.gradle.parallel=true
org.gradle.workers.max=2
org.gradle.caching=true
kotlin.incremental=true
kotlin.code.style=official

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true

#MPP - Configuration basique
kotlin.mpp.androidSourceSetLayoutVersion=2
kotlin.mpp.androidSourceSetLayoutV2AndroidStyleDirs.nowarn=true
kotlin.mpp.applyDefaultHierarchyTemplate=true
kotlin.native.disableCompilerDaemon=true

# Kotlin Native - Configuration moderne
#kotlin.native.binary.memoryModel=experimental
kotlin.native.binary.freezing=disabled
kotlin.native.binary.gc=cms

#ksp
ksp.useKSP2=true

# Jansi - Configuration pour éviter les problèmes d'architecture
jansi.tmpdir=/tmp
