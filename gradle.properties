# Configuration mémoire optimisée pour iOS
org.gradle.jvmargs=-Xmx8g -XX:MaxMetaspaceSize=8096m -XX:+UseG1GC -Dfile.encoding=UTF-8 
kotlin.daemon.jvmargs=-Xmx8g -XX:+UseG1GC
org.gradle.parallel=true
org.gradle.workers.max=4
org.gradle.configureondemand=true
kotlin.incremental=true
kotlin.code.style=official

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true

#MPP
kotlin.mpp.androidSourceSetLayoutVersion=2
kotlin.mpp.enableCInteropCommonization=true
kotlin.native.disableCompilerDaemon = true



#Tests
kotlin.mpp.androidSourceSetLayoutV2AndroidStyleDirs.nowarn=true
kotlin.test.infer.jvm.variant=true

#Experimental Features
kotlin.mpp.stability.nowarn=true

#ksp
ksp.useKSP2=true
